name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native runners: build + vet + test (coverage) on the two arches GitHub
  # offers hosted runners for. squashfs-tools (mksquashfs / unsquashfs) is
  # installed so the interop round-trip tests actually master real images and
  # read them back, rather than skipping. This is where COVERAGE_FLOOR is
  # enforced.
  native:
    name: native ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    env:
      # Coverage floor on the combined (-coverpkg=./...) profile. The pure-Go
      # decoder/encoder path measures 77.7% with mksquashfs absent; installing
      # squashfs-tools below only raises it, so the floor stays safely met
      # while still catching regressions.
      COVERAGE_FLOOR: "77.0"
    steps:
      - name: Checkout squashfs
        uses: actions/checkout@v4
        with:
          path: squashfs

      # go.mod carries `replace github.com/go-filesystems/interface =>
      # ../interface`, so the sibling module must sit next to this one.
      - name: Checkout interface (sibling replace target)
        uses: actions/checkout@v4
        with:
          repository: go-filesystems/interface
          path: interface

      - name: Install squashfs-tools (mksquashfs / unsquashfs)
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: squashfs/go.mod

      - name: Build
        working-directory: squashfs
        env:
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Vet
        working-directory: squashfs
        env:
          CGO_ENABLED: "0"
        run: go vet ./...

      - name: Test (coverage)
        working-directory: squashfs
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 -coverpkg=./... -coverprofile=cover.out -timeout=20m ./...

      - name: Enforce coverage floor
        working-directory: squashfs
        run: |
          set -euo pipefail
          total=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "total coverage: ${total}% (floor: ${COVERAGE_FLOOR}%)"
          awk -v t="$total" -v f="$COVERAGE_FLOOR" \
            'BEGIN { if (t+0 < f+0) { printf "coverage %.1f%% below floor %.1f%%\n", t, f; exit 1 } }'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.arch }}
          path: squashfs/cover.out
          if-no-files-found: ignore

  # Emulated runners: cross-compile a static (CGO_ENABLED=0) test binary per
  # package and run it under QEMU for each non-native 64-bit arch.
  #
  # The bare Debian image carries no squashfs-tools, so the mksquashfs/
  # unsquashfs interop tests skip cleanly (t.Skip via exec.LookPath). What
  # still runs is the pure-Go decompressor/decoder/encoder path. That is the
  # byte-order test: the on-disk superblock / inode / directory / metadata
  # decoders all use explicit binary.LittleEndian, so on the big-endian s390x
  # host the parsed values must still come out correct.
  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu: rv64,v=true,vlen=128
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu: la464
          - arch: ppc64le
            image: debian:trixie
            qemu: power9
          - arch: s390x
            image: debian:trixie
            qemu: qemu
    steps:
      - name: Checkout squashfs
        uses: actions/checkout@v4
        with:
          path: squashfs

      - name: Checkout interface (sibling replace target)
        uses: actions/checkout@v4
        with:
          repository: go-filesystems/interface
          path: interface

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: squashfs/go.mod

      - name: Register QEMU binfmt handlers
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Cross-compile per-package test binaries
        working-directory: squashfs
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p /tmp/tests
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/' '_')
            # Skip packages without test files (go test -c emits no binary).
            go test -c -cover -o "/tmp/tests/${name}.test" "$pkg"
            if [ -f "/tmp/tests/${name}.test" ]; then
              echo "built ${name}.test"
            fi
          done
          ls -la /tmp/tests

      - name: Run test binaries under QEMU (${{ matrix.arch }})
        env:
          QEMU_CPU: ${{ matrix.qemu }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          bins=(/tmp/tests/*.test)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "no test binaries to run"; exit 0
          fi
          rc=0
          for bin in "${bins[@]}"; do
            echo "::group::$(basename "$bin")"
            if ! docker run --rm \
              --platform linux/${{ matrix.arch }} \
              -e QEMU_CPU="${QEMU_CPU}" \
              -v /tmp/tests:/t -w /t \
              ${{ matrix.image }} \
              "./$(basename "$bin")" -test.v -test.timeout=20m; then
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc
